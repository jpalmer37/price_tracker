services:
  postgres:
    image: postgres:14-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-dbuser}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-S3cret}
      POSTGRES_DB: ${DATABASE_NAME:-price_tracker}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-dbuser} -d ${DATABASE_NAME:-price_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 5

  tracker:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_USERNAME: ${DATABASE_USERNAME:-dbuser}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-S3cret}
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${DATABASE_NAME:-price_tracker}

volumes:
  pgdata: